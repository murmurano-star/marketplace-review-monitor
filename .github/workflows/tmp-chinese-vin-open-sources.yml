name: Temporary Chinese VIN open-source scan

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/chinese_vin_open_sources.py'
      - '.github/workflows/tmp-chinese-vin-open-sources.yml'

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install 'httpx[http2]' openpyxl
      - name: Search open sources
        run: python scripts/chinese_vin_open_sources.py
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: chinese-vin-open-sources
          path: |
            reports/chinese_vin_open_sources.xlsx
            reports/chinese_vin_open_sources.json
          if-no-files-found: error
          retention-days: 7
